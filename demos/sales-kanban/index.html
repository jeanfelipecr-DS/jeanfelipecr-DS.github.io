<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ACME • Kanban Comercial — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ===================================================================
     ACME — Painel de TV do Kanban Comercial · VERSÃO DEMO P/ EVENTO
     Dados 100% fictícios embutidos (sem Google Sheets, roda offline).
     SDRs encenam 5 estados: bateu (fogo ~101%), excedeu (inferno ~155%),
     quase entregue (azul), no meio (laranja), bem ruim (vermelho).
     Closers se medem por VENDA (meta = vendas; reunião é consequência):
     2 verde / 1 azul / 1 laranja / 1 vermelho. Reuniões realizadas dos
     closers = soma dos comparecimentos das SDRs (14). Calendário binário:
     verde = bateu a meta do dia · vermelho = não bateu (sem meio-termo).
     Relógio do semáforo congelado em 5/8 do turno. Balões repetem a cada F5.
     =================================================================== */
  :root{                              /* ---- TEMA LIGHT (padrão) ---- */
    --navy:#1B3A6B; --navy-2:#15315A; --navy-lt:#3D6FBF;
    --bg-0:#E7EDF6; --bg-1:#F3F7FC; --halo:rgba(61,111,191,.12);
    --surface:#FFFFFF; --surface-lt:#FBFDFF;
    --border:#E2E8F0; --line:#EDF1F7; --ring-track:#E5EAF2;
    --text:#1E293B; --muted:#64748B; --dim:#94A3B8;
    --track:#EAEFF6; --grid-line:rgba(27,58,107,.045);
    --green:#16A34A; --orange:#F97316; --red:#EF4444; --gray:#94A3B8; --blue:#2563EB;
    --gold:#E0A100; --silver:#8C9BB3; --bronze:#C2772F;
    --shadow:0 1px 3px rgba(20,40,80,.07),0 6px 22px rgba(20,40,80,.07);
    --card:linear-gradient(180deg,var(--surface-lt),var(--surface));
    --chip:rgba(61,111,191,.10); --chip-bd:rgba(61,111,191,.30); --chip-tx:#2C5BA0;
    --bg-green:#DCFCE7; --bg-orange:#FEF3C7; --bg-red:#FEE2E2; --bg-gray:#F1F5F9;
    --tx-green:#15803D; --tx-orange:#B45309; --tx-red:#DC2626; --tx-gray:#64748B;
    --rc-tx:#fff;
    --radius:18px; --radius-sm:12px;
    --font:'Barlow',system-ui,-apple-system,sans-serif;
    --cond:'Barlow Condensed','Barlow',sans-serif;
  }
  body[data-theme="dark"]{            /* ---- TEMA DARK (placar) ---- */
    --bg-0:#05101F; --bg-1:#0A1A33; --halo:rgba(61,111,191,.22);
    --surface:#0F2547; --surface-lt:#163366;
    --border:#244575; --line:#1C3760; --ring-track:#1A3257;
    --text:#EDF3FF; --muted:#9FB4D8; --dim:#62799F;
    --track:#132748; --grid-line:rgba(255,255,255,.022);
    --green:#2FD673; --orange:#FCA13B; --red:#FB4D6D; --gray:#6E83A6; --blue:#6FAAFF;
    --gold:#FBCB3A; --silver:#CAD6E8; --bronze:#E58D46;
    --shadow:0 1vh 2.6vh rgba(0,0,0,.45);
    --chip:rgba(61,111,191,.18); --chip-bd:rgba(61,111,191,.40); --chip-tx:#9DC0F2;
    --bg-green:rgba(47,214,115,.16); --bg-orange:rgba(252,161,59,.16); --bg-red:rgba(251,77,109,.16); --bg-gray:rgba(255,255,255,.06);
    --tx-green:#62E59B; --tx-orange:#FCB667; --tx-red:#FB7E96; --tx-gray:#9FB4D8;
    --rc-tx:#08151f;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(130vw 90vh at 50% -18vh, var(--halo), transparent 62%),
      linear-gradient(180deg, var(--bg-1), var(--bg-0) 75%);
    color:var(--text); overflow:hidden; font-family:var(--font); -webkit-font-smoothing:antialiased;
    transition:background .4s ease, color .4s ease;
  }
  body::before{ content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:linear-gradient(var(--grid-line) 1px, transparent 1px),linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:3vw 3vw;
    -webkit-mask-image:radial-gradient(130vw 100vh at 50% 0, #000, transparent 78%);
            mask-image:radial-gradient(130vw 100vh at 50% 0, #000, transparent 78%); }
  .wrap{height:100vh; display:flex; flex-direction:column; position:relative; z-index:1}
  /* ---- topo (navy nos 2 temas) ---- */
  header{ background:linear-gradient(100deg, var(--navy), var(--navy-2)); border-bottom:1px solid rgba(255,255,255,.07);
    color:#fff; display:flex; align-items:center; justify-content:space-between; gap:1vw; padding:1.5vh 1.9vw; box-shadow:0 1vh 3vh rgba(0,0,0,.28); z-index:5; }
  .brand{display:flex; align-items:baseline; gap:.9vw}
  .brand b{font-family:var(--cond); font-size:3vw; font-weight:800; letter-spacing:.03em; line-height:.85; color:#fff}
  .brand span{font-size:1.2vw; font-weight:500; color:#AAC2E8; letter-spacing:.02em}
  .center{display:flex; flex-direction:column; align-items:center; gap:.1vh}
  .clock{font-family:var(--cond); font-size:4vw; font-weight:700; font-variant-numeric:tabular-nums; line-height:.9; letter-spacing:.02em; text-shadow:0 0 3.2vh rgba(120,170,255,.5)}
  .rightinfo{display:flex; flex-direction:column; align-items:flex-end; gap:.5vh}
  .live{display:flex; align-items:center; gap:.5vw; font-size:1vw; font-weight:700; letter-spacing:.12em; color:#84F0AE}
  .live i{width:.8vw; height:.8vw; border-radius:50%; background:#2FD673; box-shadow:0 0 0 0 rgba(47,214,115,.6); animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,214,115,.55)}70%{box-shadow:0 0 0 1.1vw rgba(47,214,115,0)}100%{box-shadow:0 0 0 0 rgba(47,214,115,0)}}
  .updated{font-size:1vw; color:#A8C0E6}
  .updated.stale{color:#FCA5B5}
  .dots{display:flex; gap:.5vw}
  .dots i{width:.85vw; height:.85vw; border-radius:50%; background:rgba(255,255,255,.22)}
  .dots i.on{background:#fff; box-shadow:0 0 1.2vh rgba(255,255,255,.7)}
  /* ---- telas ---- */
  .stage{flex:1; min-height:0; position:relative}
  .screen{position:absolute; inset:0; padding:1.6vh 1.9vw; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity .5s ease}
  .screen.on{opacity:1; pointer-events:auto}
  .screen-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2vh}
  .screen-head h2{font-family:var(--cond); font-size:2.1vw; font-weight:700; color:var(--navy); letter-spacing:.02em; display:flex; align-items:center; gap:.7vw}
  body[data-theme="dark"] .screen-head h2{color:#fff}
  .screen-head h2::before{content:""; width:.36vw; height:2vw; border-radius:99px; background:linear-gradient(180deg,var(--green),var(--navy-lt)); box-shadow:0 0 1.4vh rgba(47,214,115,.45)}
  .screen-head .sub{font-family:var(--cond); font-size:1.7vw; font-weight:600; color:var(--muted); letter-spacing:.02em}
  /* ---- cards de colaborador (SDR e Closer) ---- */
  .grid{flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:1vw; min-height:0}
  .cardw{position:relative; display:flex; min-height:0; min-width:0}
  .cardw>.card{flex:1; min-width:0; z-index:1}
  .cardw.on-fire{z-index:2}
  .card{position:relative; background:var(--card); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:1.6vh 1.2vw 1.3vh; display:flex; flex-direction:column; overflow:hidden}
  .card::before{content:""; position:absolute; top:0; left:0; right:0; height:.45vh; background:var(--c,transparent); box-shadow:0 0 1.6vh var(--c)}
  .card-h{display:flex; align-items:center; gap:.5vw; margin-bottom:1vh; padding-bottom:1vh; border-bottom:1px solid var(--line)}
  .card-h .dot{width:1.05vw; height:1.05vw; border-radius:50%; flex:none; box-shadow:0 0 1.2vh currentColor}
  .card-h .nm{font-family:var(--cond); font-size:2vw; font-weight:700; color:var(--text); line-height:.95; letter-spacing:.01em; white-space:nowrap; overflow:hidden; flex:1; min-width:0}
  .card-h .rl{margin-left:auto; flex:none; font-size:.78vw; font-weight:700; letter-spacing:.08em; color:var(--chip-tx); background:var(--chip); border:1px solid var(--chip-bd); padding:.25vh .55vw; border-radius:99px}
  .metric{margin-top:1.1vh}
  .metric .top{display:flex; justify-content:space-between; align-items:baseline; gap:.5vw; margin-bottom:.5vh}
  .metric .lb{font-size:.92vw; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .metric .top>span{flex:none; white-space:nowrap}
  .metric .vl{font-family:var(--cond); font-size:2.2vw; font-weight:800; font-variant-numeric:tabular-nums; line-height:.85}
  .metric .vmeta{font-family:var(--cond); font-size:1.55vw; font-weight:700; color:var(--muted); margin-left:.35vw; font-variant-numeric:tabular-nums}
  .metric .track{height:1.3vh; background:var(--track); border-radius:99px; overflow:hidden; box-shadow:inset 0 0 0 1px rgba(127,127,127,.08)}
  .metric .track>i{display:block; height:100%; border-radius:99px; transition:width .5s ease}
  .metric .sub{font-size:.8vw; color:var(--dim); margin-top:.4vh}
  /* métrica grande p/ a venda do closer (headline) */
  .metric.big .vl{font-size:3vw}
  .metric.big .vmeta{font-size:2vw}
  .metric.big .lb{font-size:1.1vw}
  .metric.big .track{height:1.7vh}
  /* ---- comemoração: meta batida = balões + vibração + brilho ---- */
  .card.celebrating{animation:shake .8s ease-in-out 2; box-shadow:0 0 3.4vh rgba(22,163,74,.55), var(--shadow); z-index:4}
  @keyframes shake{
    0%,100%{transform:translate(0,0) rotate(0)}
    12%{transform:translate(-.28vw,.18vh) rotate(-.6deg)} 24%{transform:translate(.28vw,-.18vh) rotate(.6deg)}
    36%{transform:translate(-.22vw,.12vh) rotate(-.45deg)} 48%{transform:translate(.22vw,-.12vh) rotate(.45deg)}
    60%{transform:translate(-.15vw,.08vh) rotate(-.3deg)} 72%{transform:translate(.15vw,-.08vh) rotate(.3deg)}
    84%{transform:translate(-.07vw,.04vh) rotate(-.15deg)} }
  .balloons{position:absolute; inset:0; pointer-events:none; z-index:6; overflow:hidden}
  .balloon{position:absolute; bottom:-16%; width:2.1vw; height:2.6vw; border-radius:48% 48% 46% 46% / 56% 56% 42% 42%;
    animation:rise 3s ease-in forwards; will-change:transform,bottom}
  .balloon::before{content:""; position:absolute; left:50%; top:100%; width:1.5px; height:2.4vw; background:rgba(120,120,120,.4); transform:translateX(-50%)}
  .balloon::after{content:""; position:absolute; left:22%; top:12%; width:30%; height:24%; border-radius:50%; background:rgba(255,255,255,.5); transform:rotate(-28deg)}
  @keyframes rise{
    0%{bottom:-16%; transform:translateX(0) rotate(-4deg); opacity:0}
    10%{opacity:1}
    35%{transform:translateX(var(--sx)) rotate(5deg)}
    70%{transform:translateX(calc(var(--sx)*-1)) rotate(-5deg)}
    100%{bottom:112%; transform:translateX(calc(var(--sx)*.5)) rotate(3deg); opacity:.95} }
  /* ---- TODAS as metas batidas = fogo EM VOLTA do card (contínuo) ---- */
  .card.on-fire{border-color:rgba(249,115,22,.65); animation:fireGlow 1.6s ease-in-out infinite}
  .card.on-fire.celebrating{animation:shake .8s ease-in-out 2, fireGlow 1.6s ease-in-out infinite}
  .card.on-fire::before{background:linear-gradient(90deg,#FBBF24,#F97316,#EF4444); box-shadow:0 0 2vh rgba(249,115,22,.8)}
  @keyframes fireGlow{
    0%,100%{box-shadow:0 0 calc(2vh*var(--fi,1)) rgba(249,115,22,.5), var(--shadow)}
    50%{box-shadow:0 0 calc(4vh*var(--fi,1)) rgba(239,68,68,.7), var(--shadow)} }
  .fire{position:absolute; inset:0; pointer-events:none; z-index:0}
  .fire::before{content:""; position:absolute; inset:calc(-.28vw * var(--fi,1)); border-radius:calc(var(--radius) + .35vw);
    background:conic-gradient(from 20deg,#FBBF24,#F97316,#EF4444,#F97316,#FBBF24,#EF4444,#F97316,#FBBF24);
    filter:blur(calc(.32vw * var(--fi,1))); animation:ringPulse 1.3s ease-in-out infinite}
  @keyframes ringPulse{0%,100%{opacity:.9}50%{opacity:.55}}
  .flame{position:absolute; width:1.1vw; border-radius:50% 50% 22% 22% / 62% 62% 38% 38%;
    background:radial-gradient(circle at 50% 88%, #FEF08A 0%, #FBBF24 32%, #F97316 62%, rgba(239,68,68,.9) 86%, transparent 100%);
    transform-origin:50% 100%; animation:flick .7s ease-in-out infinite alternate; will-change:transform}
  .fl-t{top:0; translate:0 -74%}
  .fl-l{left:0; translate:-58% 0}
  .fl-r{right:0; translate:58% 0}
  @keyframes flick{
    0%{transform:scaleY(.72) scaleX(.92) translateY(5%)}
    100%{transform:scaleY(1.18) scaleX(1.06) translateY(0)} }
  .fire-badge{flex:none; font-family:var(--cond); font-size:1vw; font-weight:800; color:#fff; letter-spacing:.02em;
    background:linear-gradient(180deg,#FBBF24,#F97316 55%,#EF4444); padding:.25vh .6vw; border-radius:99px;
    box-shadow:0 0 1.4vh rgba(249,115,22,.6); animation:badgePulse 1.4s ease-in-out infinite; font-variant-numeric:tabular-nums}
  @keyframes badgePulse{50%{transform:scale(1.09)}}
  /* closer: reuniões (info) + trio de valores em negrito */
  .cl-info{margin-top:1.1vh; font-size:1vw; color:var(--muted)}
  .cl-info b{font-family:var(--cond); font-size:1.5vw; font-weight:800; color:var(--text); margin-left:.3vw}
  .cl-vals{display:flex; flex-direction:column; gap:.55vh; margin-top:1.1vh; padding-top:1.1vh; border-top:1px solid var(--line)}
  .cl-vals div{display:flex; justify-content:space-between; align-items:baseline; gap:.5vw}
  .cl-vals .k{font-size:.95vw; color:var(--text); font-weight:700; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap}
  .cl-vals .v{font-family:var(--cond); font-size:1.5vw; font-weight:800; color:var(--text); font-variant-numeric:tabular-nums; white-space:nowrap; line-height:1}
  /* régua do mês (SDR e Closer) — só verde/vermelho */
  .ruler{margin-top:auto; padding-top:1.1vh; border-top:1px dashed var(--line); position:relative; z-index:7}
  .ruler .rt{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:.6vh}
  .ruler .rt span{font-size:.82vw; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
  .ruler .rt small{font-size:.78vw; color:var(--dim)}
  .rl-cells{display:flex; flex-wrap:wrap; gap:.3vw}
  .rc{width:1.7vw; height:1.9vh; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:.74vw; font-weight:700; color:var(--rc-tx); font-variant-numeric:tabular-nums}
  .rc-green{background:var(--green); box-shadow:0 0 .9vh rgba(47,214,115,.4)}
  .rc-red{background:var(--red)}
  .rc-off{background:var(--track); color:var(--dim); font-weight:500}
  .rc-today{outline:2px solid var(--navy-lt); outline-offset:1px; animation:blink 1.6s infinite}
  body[data-theme="dark"] .rc-today{outline-color:#fff}
  @keyframes blink{0%,100%{outline-color:var(--navy-lt)}50%{outline-color:transparent}}
  /* ---- tela geral (mês) ---- */
  .two{flex:1; display:grid; grid-template-columns:1.25fr 1fr; gap:1.2vw; min-height:0}
  .col{display:flex; flex-direction:column; gap:1.2vh; min-height:0}
  .box{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:1.4vh 1.4vw; display:flex; flex-direction:column; min-height:0; overflow:hidden}
  .box h4{font-family:var(--cond); font-size:1.35vw; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-weight:700; margin-bottom:1vh; display:flex; align-items:center; gap:.5vw}
  .box h4::before{content:""; width:.3vw; height:1.2vw; background:var(--navy-lt); border-radius:99px}
  .scards{display:flex; flex-direction:column; gap:.6vh; flex:1; justify-content:space-evenly; min-height:0}
  .scard{display:flex; align-items:center; gap:1vw; background:var(--track); border:1px solid var(--line); border-radius:var(--radius-sm); padding:.5vh 1vw; min-width:0; min-height:0}
  .sring{width:min(3.4vw,7vh); height:min(3.4vw,7vh); border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center}
  .sring-in{width:70%; height:70%; background:var(--surface); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--cond); font-size:min(1.2vw,2.5vh); font-weight:800; font-variant-numeric:tabular-nums}
  .sinfo{flex:1; min-width:0}
  .sarea{font-size:.95vw; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .sval{font-family:var(--cond); font-size:min(2.1vw,4.4vh); font-weight:800; color:var(--text); font-variant-numeric:tabular-nums; line-height:1}
  .ssub{font-size:.82vw; color:var(--dim); margin-top:.1vh; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .sbadge{display:inline-block; padding:.1vh .55vw; border-radius:99px; font-size:.72vw; font-weight:700; letter-spacing:.03em; margin-right:.4vw}
  .sbadge-green{background:var(--bg-green); color:var(--tx-green)} .sbadge-orange{background:var(--bg-orange); color:var(--tx-orange)}
  .sbadge-red{background:var(--bg-red); color:var(--tx-red)} .sbadge-gray{background:var(--bg-gray); color:var(--tx-gray)}
  /* ---- ranking (top 3 · pódio ouro/prata/bronze) ---- */
  .rank{display:flex; flex-direction:column; flex:1; justify-content:center; gap:.8vh}
  .rk{display:grid; grid-template-columns:3vw 1fr auto; gap:.8vw; align-items:center; padding:.7vh 1vw; border-radius:var(--radius-sm); background:var(--track); border:1px solid transparent; flex:1; min-height:0}
  .rk .pos{width:2.4vw; height:2.4vw; border-radius:50%; display:flex; align-items:center; justify-content:center; justify-self:center; font-family:var(--cond); font-size:1.5vw; font-weight:800; color:var(--dim); background:var(--bg-gray); line-height:1}
  .rk .who{font-family:var(--cond); font-size:1.9vw; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .rk .sc{font-family:var(--cond); font-size:1.9vw; font-weight:800; font-variant-numeric:tabular-nums; text-align:right; color:var(--text)}
  .rk .sc small{display:block; font-family:var(--font); font-size:.8vw; color:var(--dim); font-weight:600}
  .rk1{background:linear-gradient(90deg, color-mix(in srgb, var(--gold) 45%, var(--surface)), color-mix(in srgb, var(--gold) 12%, var(--surface))); border-color:var(--gold)}
  .rk1 .pos{background:var(--gold); color:var(--rc-tx); box-shadow:0 0 1.6vh color-mix(in srgb, var(--gold) 60%, transparent)}
  .rk2{background:linear-gradient(90deg, color-mix(in srgb, var(--silver) 45%, var(--surface)), color-mix(in srgb, var(--silver) 12%, var(--surface))); border-color:var(--silver)}
  .rk2 .pos{background:var(--silver); color:var(--rc-tx); box-shadow:0 0 1.6vh color-mix(in srgb, var(--silver) 55%, transparent)}
  .rk3{background:linear-gradient(90deg, color-mix(in srgb, var(--bronze) 45%, var(--surface)), color-mix(in srgb, var(--bronze) 12%, var(--surface))); border-color:var(--bronze)}
  .rk3 .pos{background:var(--bronze); color:var(--rc-tx); box-shadow:0 0 1.6vh color-mix(in srgb, var(--bronze) 55%, transparent)}
</style>
</head>
<body data-theme="light">
<div class="wrap">
  <header>
    <div class="brand"><b>ACME</b><span id="sub">Kanban Comercial</span></div>
    <div class="center"><div class="clock" id="clock">--:--:--</div></div>
    <div class="rightinfo">
      <div class="live"><i></i>AO VIVO</div>
      <div class="updated" id="updated">aguardando dados…</div>
      <div class="dots" id="dots"><i class="on"></i><i></i><i></i></div>
    </div>
  </header>

  <div class="stage">
    <!-- TELA 1 — SDR -->
    <section class="screen on" id="screen1">
      <div class="screen-head"><h2>Ritmo do dia · por SDR</h2><span class="sub" id="day1">—</span></div>
      <div class="grid" id="sdrGrid"></div>
    </section>
    <!-- TELA 2 — CLOSER -->
    <section class="screen" id="screen2">
      <div class="screen-head"><h2>Closers · vendas do dia</h2><span class="sub" id="dayC">—</span></div>
      <div class="grid" id="closerGrid"></div>
    </section>
    <!-- TELA 3 — GERAL (MÊS) -->
    <section class="screen" id="screen3">
      <div class="screen-head"><h2>Mês · funil, faturamento e ranking</h2><span class="sub" id="comp2">—</span></div>
      <div class="two">
        <div class="col">
          <div class="box" style="flex:2.4"><h4>Funil do mês · anel = % da meta do mês</h4><div class="scards" id="funnel"></div></div>
          <div class="box" style="flex:1"><h4>Faturamento · meta do mês</h4><div class="scards" id="money"></div></div>
        </div>
        <div class="col">
          <div class="box" style="flex:1"><h4>Ranking SDR · comparecimentos no mês</h4><div class="rank" id="rankSdr"></div></div>
          <div class="box" style="flex:1"><h4>Ranking Closer · vendas no mês</h4><div class="rank" id="rankClo"></div></div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
/* =====================================================================
   VERSÃO DEMO — sem Google Sheets. Tudo vem do bloco DEMO abaixo.
   Estados encenados (1º bateu · 2º excedeu · 3º quase · 4º meio · 5º ruim).
   ===================================================================== */
const SHEET_ID = "";                       // vazio = usa DEMO embutido (offline)
const REFRESH_MS=60000;
const SCREENS=[{id:"screen1",ms:30000},{id:"screen2",ms:10000},{id:"screen3",ms:15000}];  // SDR 30s · Closer 10s · Geral 15s
const SLOTS=["10:00","11:30","14:00","15:00","16:00","17:00","18:00","19:00"];
const RISK_BLUE=0.20, RISK_ORANGE=0.45;   // risco = % do turno decorrido − % da meta entregue
const SDR_GRPS=["Novas","Follow-up","Agendamentos","Comparecimentos"];
const CLO_GRPS=["Vendas"];                 // closer se mede por VENDA
const DEMO_FRAC=5/8;                       // relógio congelado: 5 de 8 slots (meio de tarde)
const DEMO_TODAY=new Date(2026,5,30,13,30,0);   // demo travado em 30/jun/2026 (TERÇA, último dia útil) — fim de mês: números mensais fechados
/* rótulo do card (display) → grupo da régua */
const LABEL2GRP={"Ligações novas":"Novas","Follow-up":"Follow-up","Agendamentos":"Agendamentos","Comparecimentos":"Comparecimentos","Vendas":"Vendas"};

/* ---- cor / brilho ----------------------------------------------- */
function dayFrac(){return DEMO_FRAC;}      // DEMO: fração do turno fixa p/ cores estáveis no palco
function toneDay(real,target,frac){
  if(target==null||target<=0) return "gray";
  if(real>=target) return "green";
  const risk=frac - real/target;
  return risk<=RISK_BLUE?"blue":risk<=RISK_ORANGE?"orange":"red";
}
function cssvar(t){return t==="green"?"var(--green)":t==="orange"?"var(--orange)":t==="red"?"var(--red)":t==="blue"?"var(--blue)":"var(--gray)";}
let RAW={green:"#16A34A",orange:"#F97316",red:"#EF4444",gray:"#94A3B8",blue:"#2563EB"};
function syncRaw(){ const cs=getComputedStyle(document.body);
  for(const k of ["green","orange","red","gray","blue"]){ const v=cs.getPropertyValue("--"+k).trim(); if(v) RAW[k]=v; } }
function cssraw(t){ return RAW[t]||RAW.gray; }
const isNum=v=>typeof v==="number"&&!isNaN(v);
const fmtInt=v=>(v==null||v==="")?"—":Math.round(v).toLocaleString("pt-BR");
const fmtMoney=v=>(v==null||v==="")?"—":"R$ "+Math.round(v).toLocaleString("pt-BR");

/* ---- datas ------------------------------------------------------ */
const MESES=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const dShort=d=>d?d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"}):"";
const dComp =d=>d?MESES[d.getMonth()]+"/"+d.getFullYear():"";
const ymd=d=>d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();

/* ---- DEMO — dados fictícios ------------------------------------- */
/* metas/dia: novas 30 · follow-up 20 · agend 7 · comparec 4 · VENDAS closer 3 */
const DEMO_METAS={Novas:30,"Follow-up":20,Agendamentos:7,Comparecimentos:4,"Vendas":3};
const DEMO={
  dia:{date:DEMO_TODAY, sdrs:[
    /* 1 BATEU — tudo cravado, fogo discreto (~101%) */
    mk("Helena",[["Ligações novas",30,31],["Follow-up",20,20],["Agendamentos",7,7],["Comparecimentos",4,4]]),
    /* 2 EXCEDEU — muito acima, inferno (~155%) */
    mk("Marina",[["Ligações novas",30,47],["Follow-up",20,31],["Agendamentos",7,11],["Comparecimentos",4,6]]),
    /* 3 QUASE ENTREGUE — ~90%, azul (no ritmo) */
    mk("Duda",[["Ligações novas",30,27],["Follow-up",20,18],["Agendamentos",7,6],["Comparecimentos",4,3]]),
    /* 4 NO MEIO — ~40%, laranja (atenção) */
    mk("Bia",[["Ligações novas",30,12],["Follow-up",20,8],["Agendamentos",7,2],["Comparecimentos",4,1]]),
    /* 5 BEM RUIM — quase nada, vermelho */
    mk("Carol",[["Ligações novas",30,3],["Follow-up",20,1],["Agendamentos",7,0],["Comparecimentos",4,0]]),
  ],
  /* closers se medem por VENDA. reuniões realizadas somam 14 = comparecimentos das SDRs (4+6+3+1+0).
     meta vendas/dia = 3. orçado >= vendido. ticket = vendido/vendas. */
  closers:[
    {name:"Rafael", vendas:3, reun:3, orcado:58000, vendido:42000},   // BATEU   (fogo ~100%)
    {name:"Bruno",  vendas:5, reun:5, orcado:96000, vendido:71000},   // EXCEDEU (inferno ~167%)
    {name:"Thiago", vendas:2, reun:4, orcado:51000, vendido:24000},   // QUASE   (azul)
    {name:"Diego",  vendas:0, reun:2, orcado:19000, vendido:0},       // BEM RUIM(vermelho)
  ]},
  /* fim de mês: funil = totais mensais, coerente com os rankings e com os decks (faturamento 1.574.000) */
  funil:{comp:DEMO_TODAY, funnel:[
    {name:"Leads recebidos",meta:3700,real:3450},{name:"Ligações novas",meta:3200,real:3012},
    {name:"Reuniões agendadas",meta:700,real:631},{name:"Comparecimentos",meta:420,real:332},
    {name:"Vendas",meta:110,real:118}],
    fin:[{name:"Faturamento",meta:1500000,real:1574000},{name:"Recebimento",meta:1045000,real:958000}]},
  /* ranking SDR por COMPARECIMENTOS no mês · ranking closer por VENDAS no mês */
  mes:{sdr:[{name:"Marina",val:118},{name:"Helena",val:96},{name:"Duda",val:71},{name:"Bia",val:38},{name:"Carol",val:9}],
       clo:[{name:"Bruno",vendas:48,fat:684000},{name:"Rafael",vendas:39,fat:534000},{name:"Thiago",vendas:27,fat:318000},{name:"Diego",vendas:4,fat:38000}]},
};
function mk(name,rows){return {name,rows:rows.map(([label,meta,total])=>({label,meta,total}))};}
/* histórico mensal coerente com a persona: fator alto = mês verde, baixo = vermelho */
const DEMO_FACTOR={Helena:1.05, Marina:1.35, Duda:0.92, Bia:0.55, Carol:0.18,
                   Rafael:1.05, Bruno:1.4, Thiago:0.85, Marcos:0.5, Diego:0.15};
function demoHist(names){
  const now=DEMO_TODAY, y=now.getFullYear(), mo=now.getMonth(); const dim=new Date(y,mo+1,0).getDate(); const h={};
  names.forEach((nm,ni)=>{ const f=DEMO_FACTOR[nm]!=null?DEMO_FACTOR[nm]:0.8; h[nm]={};
    for(let d=1; d<=dim; d++){
      const v=0.78+(((d*7+ni*5)%10)/10)*0.5;   // variação determinística 0.78–1.28
      h[nm][d]={Novas:Math.round(30*f*v),"Follow-up":Math.round(20*f*v),
                Agendamentos:Math.round(7*f*v),Comparecimentos:Math.round(4*f*v),
                "Vendas":Math.round(3*f*v)};
    }});
  return h;
}
function demoData(){ return {...DEMO, history:demoHist([...DEMO.dia.sdrs.map(s=>s.name),...DEMO.dia.closers.map(c=>c.name)]),
    metas:DEMO_METAS, feriados:new Set(), ref:DEMO_TODAY}; }

/* ---- estado / carga --------------------------------------------- */
let DATA=null, lastOK=null;
function loadData(){ DATA=demoData(); lastOK=new Date(); setUpdated(false); render(); }
function setUpdated(stale){ const el=document.getElementById("updated"); const t=lastOK?lastOK.toLocaleTimeString("pt-BR"):"—";
  el.textContent=(stale?"⚠ sem conexão · ":"⟳ ")+"atualizado "+t; el.className="updated"+(stale?" stale":""); }

/* ---- comemoração: balões + vibração (DEMO: repete a cada F5) ----- */
const CELEB_COLORS=["#EF4444","#F59E0B","#16A34A","#2563EB","#8B5CF6","#EC4899"];
let CELEB={keys:new Set()};   // DEMO: só memória da sessão — recarregou a página, festa de novo
function celebrate(card, hits){
  card.classList.add("celebrating");
  setTimeout(()=>card.classList.remove("celebrating"), 1700);
  const lay=document.createElement("div"); lay.className="balloons";
  const n=Math.min(8+hits*4, 18);
  for(let i=0;i<n;i++){
    const b=document.createElement("span"); b.className="balloon";
    const c=CELEB_COLORS[i%CELEB_COLORS.length];
    b.style.left=(4+Math.random()*86)+"%";
    b.style.background=`radial-gradient(circle at 32% 24%, color-mix(in srgb, ${c} 55%, #fff), ${c} 62%, color-mix(in srgb, ${c} 72%, #000))`;
    b.style.setProperty("--sx", ((Math.random()<.5?-1:1)*(0.5+Math.random()*1.3)).toFixed(2)+"vw");
    b.style.animationDuration=(2.6+Math.random()*1.9).toFixed(2)+"s";
    b.style.animationDelay=(Math.random()*0.9).toFixed(2)+"s";
    lay.appendChild(b);
  }
  card.appendChild(lay);
  setTimeout(()=>lay.remove(), 6000);
}
function maybeCelebrate(card, dayKey, name, greenLabels){
  const fresh=greenLabels.filter(lb=>!CELEB.keys.has(dayKey+"|"+name+"|"+lb));
  if(!fresh.length) return;
  fresh.forEach(lb=>CELEB.keys.add(dayKey+"|"+name+"|"+lb));
  celebrate(card, fresh.length);
}

/* ---- fogo: TODAS as metas batidas = chamas EM VOLTA do card ------ */
function fireAvg(rows){
  const rs=rows.filter(r=>r.meta!=null && r.meta>0);
  if(!rs.length || !rs.every(r=>r.total>=r.meta)) return null;
  return rs.reduce((a,r)=>a+r.total/r.meta,0)/rs.length;
}
function fireHTML(avg){
  const inten=Math.max(0, Math.min(1,(avg-1)/0.6));
  const sc=0.85+inten*0.75;
  const nTop=6+Math.round(inten*5);
  const nSide=3+Math.round(inten*3);
  let s=`<div class="fire" style="--fi:${(1+inten).toFixed(2)}">`;
  for(let i=0;i<nTop;i++){
    const left=((i+0.5)/nTop*100+((i%2)?-2:2)).toFixed(1);
    const h=((2.1+((i*41)%25)/14)*sc).toFixed(2);
    const dur=(0.5+((i*29)%45)/100).toFixed(2), dl=(((i*53)%80)/100).toFixed(2);
    s+=`<span class="flame fl-t" style="left:${left}%; height:${h}vh; animation-duration:${dur}s; animation-delay:-${dl}s"></span>`;
  }
  for(let i=0;i<nSide;i++){
    const top=(10+(i+0.5)/nSide*72).toFixed(1);
    const h=((1.8+((i*37)%20)/12)*sc).toFixed(2);
    const dur=(0.55+((i*31)%40)/100).toFixed(2), dl=(((i*47)%70)/100).toFixed(2);
    s+=`<span class="flame fl-l" style="top:${top}%; height:${h}vh; animation-duration:${dur}s; animation-delay:-${dl}s"></span>`;
    s+=`<span class="flame fl-r" style="top:${(+top+6).toFixed(1)}%; height:${h}vh; animation-duration:${dur}s; animation-delay:-${dl}s"></span>`;
  }
  return s+"</div>";
}
const fireBadgeHTML=avg=>`<span class="fire-badge">🔥 ${Math.round(avg*100)}%</span>`;

/* ---- régua do mês — BINÁRIA: verde = bateu meta do dia · vermelho = não --- */
/* o dia de HOJE usa o tally real do card (todayTotals); dias passados usam o histórico */
function buildRuler(name, hist, metas, feriados, ref, now, grps, todayTotals){
  const y=ref.getFullYear(), mo=ref.getMonth(); const dim=new Date(y,mo+1,0).getDate();
  const todayKey=ymd(now);
  const groups=grps||SDR_GRPS;
  const cells=[];
  for(let day=1; day<=dim; day++){
    const dt=new Date(y,mo,day); const wd=dt.getDay(); const key=ymd(dt);
    const isBiz = wd>=1 && wd<=5 && !feriados.has(key); const isToday = key===todayKey;
    const future = dt.getTime() > now.getTime();
    if(!isBiz || future){ cells.push({day, cls:"off", today:isToday}); continue; }
    const src = (isToday && todayTotals) ? todayTotals : ((hist[name]&&hist[name][day])||{});
    let ratios=[], act=0;
    for(const k of groups){ const r=src[k]||0; act+=r; const m=(metas[k]||0); if(m>0) ratios.push(r/m); }
    const sc = ratios.length?ratios.reduce((a,b)=>a+b,0)/ratios.length:0;
    cells.push({day, cls:(act>0 && sc>=1)?"green":"red", today:isToday});   // só verde ou vermelho
  }
  return cells;
}
function bizStats(ref, feriados, now){
  const y=ref.getFullYear(), mo=ref.getMonth(); const dim=new Date(y,mo+1,0).getDate();
  let uteis=0, decorridos=0;
  for(let day=1; day<=dim; day++){ const dt=new Date(y,mo,day); const wd=dt.getDay();
    if(wd>=1 && wd<=5 && !feriados.has(ymd(dt))){ uteis++; if(dt.getTime()<=now.getTime()) decorridos++; } }
  return {uteis, decorridos, fracao: uteis?decorridos/uteis:0};
}

/* ---- render ----------------------------------------------------- */
function render(){ if(!DATA) return; renderSDR(); renderCloser(); renderGeral(); }
function metricHTML(row,frac,big){
  const hasMeta = row.meta!=null && row.meta>0;
  const t = hasMeta?toneDay(row.total,row.meta,frac):"gray";
  const fill=hasMeta?Math.min(100,row.total/row.meta*100):0;
  const vmeta = hasMeta?`<span class="vmeta">/ ${fmtInt(row.meta)}</span>`:"";
  let sub="sem meta no dia";
  if(hasMeta){
    if(t==="green") sub="✔ meta do dia batida";
    else sub=`falta ${fmtInt(row.meta-row.total)} p/ o dia · ritmo pede ${fmtInt(Math.ceil(row.meta*frac))} até agora`;
  }
  return {t, html:`<div class="metric${big?' big':''}">
      <div class="top"><span class="lb">${row.label}</span>
        <span><span class="vl" style="color:${cssvar(t)};text-shadow:0 0 1.4vh ${cssraw(t)}55">${fmtInt(row.total)}</span>${vmeta}</span></div>
      <div class="track"><i style="width:${fill}%;background:${cssvar(t)};box-shadow:0 0 1vh ${cssraw(t)}99"></i></div>
      <div class="sub">${sub}</div></div>`};
}
function rulerHTML(name, grps, todayTotals){
  const cells=buildRuler(name, DATA.history, DATA.metas, DATA.feriados, DATA.ref, DEMO_TODAY, grps, todayTotals);
  const done=cells.filter(c=>c.cls==="green").length, biz=cells.filter(c=>c.cls!=="off").length;
  const cellsHTML=cells.map(c=>`<span class="rc rc-${c.cls}${c.today?" rc-today":""}">${c.day}</span>`).join("");
  return `<div class="ruler"><div class="rt"><span>Entregas do mês</span><small>${done}/${biz} dias no verde</small></div><div class="rl-cells">${cellsHTML}</div></div>`;
}
function worstOf(ts){const o={green:0,blue:1,gray:2,orange:3,red:4};let w="green";for(const t of ts)if(o[t]>o[w])w=t;return w;}
function setCols(el,n){ el.style.gridTemplateColumns=`repeat(${Math.max(n,1)},1fr)`; }
function fitNames(scope){
  for(const el of scope.querySelectorAll(".nm")){
    el.style.fontSize="";
    let fs=parseFloat(getComputedStyle(el).fontSize);
    const min=fs*0.5; let guard=40;
    while(el.scrollWidth>el.clientWidth && fs>min && guard-->0){ fs-=0.5; el.style.fontSize=fs+"px"; }
  }
}
function buildCardW(fire, cardHTML, col){
  const wrap=document.createElement("div"); wrap.className="cardw"+(fire?" on-fire":"");
  const card=document.createElement("div"); card.className="card"+(fire?" on-fire":"");
  card.style.setProperty("--c",col);
  if(fire){ const fi=(1+Math.min(1,(fire-1)/0.6)).toFixed(2); wrap.style.setProperty("--fi",fi); card.style.setProperty("--fi",fi); }
  card.innerHTML=cardHTML;
  wrap.innerHTML=fire?fireHTML(fire):"";
  wrap.appendChild(card);
  return {wrap, card};
}
/* tally de HOJE do card → {grupo:total} p/ a célula de hoje na régua */
function todayTotalsFromRows(rows){
  const t={}; for(const r of rows){ const g=LABEL2GRP[r.label]; if(g) t[g]=r.total; } return t;
}

function renderSDR(){
  const dia=DATA.dia, frac=dayFrac();
  const dayKey=dShort(dia.date);
  document.getElementById("day1").textContent=dShort(dia.date);
  const g=document.getElementById("sdrGrid"); setCols(g, dia.sdrs.length); g.innerHTML="";
  for(const m of dia.sdrs){
    const parts=m.rows.map(r=>metricHTML(r,frac)); const worst=worstOf(parts.map(p=>p.t)), col=cssvar(worst);
    const fire=fireAvg(m.rows);
    const tt=todayTotalsFromRows(m.rows);
    const html=`<div class="card-h"><span class="dot" style="background:${col};color:${col}"></span>
        <span class="nm">${m.name}</span>${fire?fireBadgeHTML(fire):""}<span class="rl">SDR</span></div>${parts.map(p=>p.html).join("")}${rulerHTML(m.name, SDR_GRPS, tt)}`;
    const {wrap, card}=buildCardW(fire, html, cssraw(worst));
    g.appendChild(wrap);
    maybeCelebrate(card, dayKey, m.name, parts.map((p,i)=>p.t==="green"?m.rows[i].label:null).filter(Boolean));
  }
  fitNames(g);
}
function renderCloser(){
  const dia=DATA.dia, frac=dayFrac();
  const dayKey=dShort(dia.date);
  document.getElementById("dayC").textContent=dShort(dia.date);
  const metaV=DATA.metas.Vendas;
  const g=document.getElementById("closerGrid"); setCols(g, dia.closers.length); g.innerHTML="";
  for(const c of dia.closers){
    const vrow={label:"Vendas", meta:metaV, total:c.vendas};
    const part=metricHTML(vrow, frac, true);            // headline GRANDE = venda
    const fire=fireAvg([vrow]);
    const ticket=c.vendas>0?c.vendido/c.vendas:0;
    const html=`<div class="card-h"><span class="dot" style="background:${cssvar(part.t)};color:${cssvar(part.t)}"></span>
        <span class="nm">${c.name}</span>${fire?fireBadgeHTML(fire):""}<span class="rl">CLOSER</span></div>
      ${part.html}
      <div class="cl-vals">
        <div><span class="k">Orçado</span><span class="v">${fmtMoney(c.orcado)}</span></div>
        <div><span class="k">Vendido</span><span class="v">${fmtMoney(c.vendido)}</span></div>
        <div><span class="k">Ticket médio</span><span class="v">${ticket>0?fmtMoney(ticket):"—"}</span></div>
      </div>
      <div class="cl-info">Reuniões realizadas hoje: <b>${fmtInt(c.reun)}</b></div>
      ${rulerHTML(c.name, CLO_GRPS, {Vendas:c.vendas})}`;
    const {wrap, card}=buildCardW(fire, html, cssraw(part.t));
    g.appendChild(wrap);
    if(part.t==="green") maybeCelebrate(card, dayKey, c.name, ["Vendas"]);
  }
  fitNames(g);
}
/* anel de score (tela geral) */
function ringTone(ratio){ if(ratio==null) return "gray"; return ratio>=1?"green":ratio>=0.8?"orange":"red"; }
const RING_BADGE={green:"✔ No ritmo", orange:"▲ Quase", red:"▼ Abaixo", gray:"sem meta"};
function scoreCard(name, valTxt, ratio, metaTxt){
  const st=ringTone(ratio), col=cssvar(st), raw=cssraw(st);
  const has=ratio!=null&&isFinite(ratio); const pctNum=has?Math.round(ratio*100):null;
  const ringFill=has?Math.min(pctNum,100):0; const ringTxt=has?pctNum+"%":"—";
  return `<div class="scard">
      <div class="sring" style="background:conic-gradient(${col} ${ringFill}%,var(--ring-track) 0);box-shadow:0 0 1.4vh ${raw}44">
        <div class="sring-in" style="color:${col}">${ringTxt}</div></div>
      <div class="sinfo"><div class="sarea">${name}</div><div class="sval">${valTxt}</div>
        <div class="ssub"><span class="sbadge sbadge-${st}">${RING_BADGE[st]}</span>${metaTxt}</div></div></div>`;
}
function renderGeral(){
  const {funil,mes}=DATA;
  const bs=bizStats(DATA.ref, DATA.feriados, DEMO_TODAY);
  const frac=bs.fracao>0?bs.fracao:null;
  document.getElementById("comp2").textContent=dComp(funil.comp)+(bs.uteis?` · ${fmtInt(bs.decorridos)}/${fmtInt(bs.uteis)} dias úteis`:"");
  const fEl=document.getElementById("funnel"); fEl.innerHTML="";
  for(const s of funil.funnel){
    const metaHoje=(isNum(s.meta)&&frac!=null)?s.meta*frac:(isNum(s.meta)?s.meta:null);
    const ratio=(typeof s.pct==="number")?s.pct:((isNum(metaHoje)&&metaHoje>0)?s.real/metaHoje:null);
    fEl.innerHTML+=scoreCard(s.name, fmtInt(s.real), ratio, `meta do mês ${fmtInt(metaHoje)}`);
  }
  const mEl=document.getElementById("money"); mEl.innerHTML="";
  for(const f of funil.fin){
    const metaHoje=(isNum(f.meta)&&frac!=null)?f.meta*frac:(isNum(f.meta)?f.meta:null);
    const ratio=(typeof f.pct==="number")?f.pct:((isNum(metaHoje)&&metaHoje>0)?f.real/metaHoje:null);
    mEl.innerHTML+=scoreCard(f.name, fmtMoney(f.real), ratio, `meta do mês ${fmtMoney(metaHoje)}`);
  }
  const rs=document.getElementById("rankSdr"); rs.innerHTML="";
  mes.sdr.slice(0,3).forEach((x,i)=>rs.innerHTML+=`<div class="rk rk${i+1}"><span class="pos">${i+1}</span><span class="who">${x.name}</span><span class="sc">${fmtInt(x.val)}<small>comparecimentos</small></span></div>`);
  const rc=document.getElementById("rankClo"); rc.innerHTML="";
  mes.clo.slice(0,3).forEach((x,i)=>rc.innerHTML+=`<div class="rk rk${i+1}"><span class="pos">${i+1}</span><span class="who">${x.name}</span><span class="sc">${fmtInt(x.vendas)}<small>vendas · ${fmtMoney(x.fat)}</small></span></div>`);
}

/* ---- rotação (tempos próprios) / relógio / tema ----------------- */
let screenIdx=0, rotTimer=null;
function showScreen(i){
  screenIdx=((i%SCREENS.length)+SCREENS.length)%SCREENS.length;
  SCREENS.forEach((s,k)=>document.getElementById(s.id).classList.toggle("on",k===screenIdx));
  const d=document.getElementById("dots").children;
  for(let k=0;k<d.length;k++) d[k].classList.toggle("on",k===screenIdx);
}
function rotate(){ showScreen(screenIdx+1); rotTimer=setTimeout(rotate, SCREENS[screenIdx].ms); }
function tick(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("pt-BR");}

let theme=localStorage.getItem("kanban_tv_theme")||"light";
function applyTheme(){ document.body.setAttribute("data-theme", theme); syncRaw(); if(DATA) render(); }
function toggleTheme(){ theme=(theme==="dark")?"light":"dark"; localStorage.setItem("kanban_tv_theme", theme); applyTheme(); }
document.addEventListener("keydown", e=>{ if(e.key==="t"||e.key==="T") toggleTheme(); });
window.addEventListener("resize", ()=>{ if(DATA){ fitNames(document.getElementById("sdrGrid")); fitNames(document.getElementById("closerGrid")); } });

/* ---- boot ------------------------------------------------------- */
applyTheme();
loadData(); tick();
showScreen(0); rotTimer=setTimeout(rotate, SCREENS[0].ms);
setInterval(tick,1000);
setInterval(loadData,REFRESH_MS);
</script>
</body>
</html>
