<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACME • Painel Executivo — Demo</title>
<meta name="description" content="Painel executivo de BI — demo com dados 100% fictícios. Jean Felipe Carneiro.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B3A6B; --navy2:#13294B; --navy-lt:#3D6FBF;
    --bg0:#E7EDF6; --bg1:#F4F8FC; --halo:rgba(61,111,191,.13);
    --surface:#FFFFFF; --surface-lt:#FBFDFF;
    --line:#E6ECF4; --line2:#EDF1F7;
    --text:#172033; --muted:#64748B; --dim:#94A3B8;
    --green:#16A34A; --orange:#F97316; --red:#EF4444; --gray:#94A3B8;
    --ring-track:#E5EAF2; --track:#EAEFF6;
    --gold:#E0A100; --silver:#9AA7BC; --bronze:#C2772F;
    --bg-green:#DCFCE7; --bg-orange:#FEF3C7; --bg-red:#FEE2E2; --bg-gray:#EEF2F8;
    --tx-green:#15803D; --tx-orange:#B45309; --tx-red:#DC2626; --tx-gray:#64748B;
    --shadow:0 1px 2px rgba(20,40,80,.06),0 10px 30px -8px rgba(20,40,80,.14);
    --card:linear-gradient(180deg,var(--surface-lt),var(--surface));
    --cond:'Barlow Condensed','Barlow',sans-serif; --font:'Barlow',system-ui,sans-serif;
    --mono:'IBM Plex Mono',monospace; --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;
    background:radial-gradient(120vw 80vh at 50% -22vh,var(--halo),transparent 60%),linear-gradient(180deg,var(--bg1),var(--bg0) 78%)}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(27,58,107,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(27,58,107,.04) 1px,transparent 1px);
    background-size:34px 34px;-webkit-mask-image:radial-gradient(120vw 90vh at 50% 0,#000,transparent 76%);mask-image:radial-gradient(120vw 90vh at 50% 0,#000,transparent 76%)}
  .wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 22px 54px}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;justify-content:space-between;gap:22px;flex-wrap:wrap;
    background:linear-gradient(105deg,var(--navy),var(--navy2));color:#fff;border-radius:0 0 24px 24px;
    padding:22px 30px;box-shadow:0 14px 40px -12px rgba(20,40,80,.5);margin-bottom:26px}
  .brand{display:flex;align-items:baseline;gap:13px}
  .brand b{font-family:var(--cond);font-size:34px;font-weight:800;letter-spacing:.02em;line-height:.85}
  .brand span{font-size:13px;color:#9DBBEC;letter-spacing:.02em}
  .htitle{text-align:center;flex:1;min-width:200px}
  .htitle h1{font-family:var(--cond);font-size:25px;font-weight:700;letter-spacing:.02em}
  .htitle .sub{font-family:var(--mono);font-size:11.5px;color:#9DBBEC;letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
  .hscore{display:flex;align-items:center;gap:15px}
  .hscore .lbl{text-align:right;font-family:var(--mono);font-size:10.5px;color:#9DBBEC;letter-spacing:.1em;text-transform:uppercase;line-height:1.7}
  .hscore .lbl b{display:block;font-family:var(--font);font-size:13px;color:#fff;letter-spacing:0;text-transform:none;font-weight:600}
  .live{display:inline-flex;align-items:center;gap:6px;color:#84F0AE;font-weight:600}
  .live i{width:7px;height:7px;border-radius:50%;background:#2FD673;box-shadow:0 0 0 0 rgba(47,214,115,.6);animation:pulse 1.9s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,214,115,.5)}70%{box-shadow:0 0 0 8px rgba(47,214,115,0)}100%{box-shadow:0 0 0 0 rgba(47,214,115,0)}}
  .bigring{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;flex:none}
  .bigring .in{width:74px;height:74px;border-radius:50%;background:var(--navy2);display:grid;place-items:center;
    font-family:var(--cond);font-size:30px;font-weight:800;color:#fff;box-shadow:inset 0 0 14px rgba(0,0,0,.3)}

  /* ---------- area grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px 20px 16px;overflow:hidden;transition:transform .22s,box-shadow .22s}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--c,var(--navy-lt));box-shadow:0 0 14px var(--c,var(--navy-lt))}
  .card:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(20,40,80,.1),0 22px 46px -16px rgba(20,40,80,.22)}
  .card-h{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .ring{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;flex:none}
  .ring .in{width:45px;height:45px;border-radius:50%;background:var(--surface);display:grid;place-items:center;
    font-family:var(--cond);font-size:18px;font-weight:800}
  .card-h .nm{flex:1;min-width:0}
  .card-h .area{font-family:var(--cond);font-size:22px;font-weight:700;letter-spacing:.01em;line-height:1}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;margin-top:6px}
  .badge-green{background:var(--bg-green);color:var(--tx-green)}.badge-orange{background:var(--bg-orange);color:var(--tx-orange)}
  .badge-red{background:var(--bg-red);color:var(--tx-red)}.badge-gray{background:var(--bg-gray);color:var(--tx-gray)}

  .kpis{display:flex;flex-direction:column;border-top:1px solid var(--line2);margin-top:12px}
  .kpi{display:grid;grid-template-columns:1fr auto auto;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2)}
  .kpi:last-child{border-bottom:0}
  .kpi .k{font-size:13.5px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kpi .v{font-family:var(--cond);font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:.9}
  .kpi .v small{font-family:var(--font);font-size:11.5px;font-weight:600;color:var(--dim);margin-left:4px}
  .kpi .d{font-family:var(--mono);font-size:11px;font-weight:500;padding:3px 7px;border-radius:7px;white-space:nowrap;min-width:50px;text-align:center}
  .d-green{background:var(--bg-green);color:var(--tx-green)}.d-orange{background:var(--bg-orange);color:var(--tx-orange)}
  .d-red{background:var(--bg-red);color:var(--tx-red)}.d-gray{background:var(--bg-gray);color:var(--tx-gray)}

  /* ---------- bottom ---------- */
  .bottom{display:grid;grid-template-columns:1.32fr 1fr;gap:18px;margin-top:18px}
  @media(max-width:880px){.bottom{grid-template-columns:1fr}}
  .panel{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px 22px;overflow:hidden}
  .panel h3{font-family:var(--cond);font-size:18px;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:10px;letter-spacing:.01em}
  .panel h3::before{content:"";width:4px;height:17px;border-radius:99px;background:var(--navy-lt)}
  .chart{display:flex;align-items:flex-end;gap:16px;height:206px;padding-top:6px}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .vv{font-family:var(--cond);font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
  .bars{position:relative;width:100%;max-width:50px;flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0}
  .barr{width:100%;border-radius:8px 8px 0 0;position:relative;box-shadow:0 0 14px rgba(27,58,107,.18)}
  .metaline{position:absolute;left:-4px;right:-4px;height:2px;background:var(--orange);border-radius:2px}
  .metaline::after{content:"meta";position:absolute;right:0;top:-14px;font-size:9px;color:var(--orange);font-family:var(--mono);letter-spacing:.05em}
  .ml{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em}
  .funnel{display:flex;flex-direction:column;gap:10px}
  .fb{position:relative;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;background:linear-gradient(90deg,rgba(61,111,191,.2),rgba(61,111,191,.05));border:1px solid rgba(61,111,191,.22)}
  .fb .fl{font-size:13.5px;font-weight:600;color:var(--navy)}
  .fb .fv{font-family:var(--cond);font-size:21px;font-weight:800;font-variant-numeric:tabular-nums}
  .fb .conv{position:absolute;right:16px;top:-10px;font-size:10px;font-family:var(--mono);color:var(--dim)}

  footer{margin-top:30px;text-align:center;color:var(--dim);font-size:12px;font-family:var(--mono);letter-spacing:.04em}
  footer b{color:var(--bronze)}footer a{color:var(--navy-lt);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><b>ACME</b><span>Escola de Negócios</span></div>
    <div class="htitle"><h1>Painel Executivo</h1><div class="sub" id="comp">consolidado</div></div>
    <div class="hscore">
      <div class="lbl">Score consolidado<b>▲ no ritmo</b><span class="live"><i></i>AO VIVO</span></div>
      <div class="bigring" id="bigring"><div class="in" id="bigpct">—</div></div>
    </div>
  </header>

  <div class="grid" id="areas"></div>

  <div class="bottom">
    <div class="panel"><h3>Faturamento × meta — últimos 6 meses</h3><div class="chart" id="chart"></div></div>
    <div class="panel"><h3>Funil comercial do mês</h3><div class="funnel" id="funnel"></div></div>
  </div>

  <footer>demo · dados 100% fictícios · <b>Jean Felipe Carneiro</b> — <a href="https://jeanfelipecr-ds.github.io" target="_blank" rel="noopener">jeanfelipecr-ds.github.io</a></footer>
</div>

<script>
/* ===== DADOS 100% FICTÍCIOS (demo de portfólio) ===== */
const COMP="Junho / 2026", CONSOL=92;
const AREAS=[
  {name:"Marketing",score:96,kpis:[
    {k:"Leads no mês",v:1420,meta:1400,f:"int"},{k:"CPL",v:28,meta:30,f:"money",inv:true},
    {k:"ROAS",v:8.4,meta:8.0,f:"x"},{k:"Investimento",v:42000,meta:45000,f:"money",noStatus:true}]},
  {name:"Comercial",score:88,kpis:[
    {k:"Vendas",v:108,meta:123,f:"int"},{k:"Faturamento",v:1520000,meta:1500000,f:"money"},
    {k:"Ticket médio",v:9200,meta:9000,f:"money"},{k:"Taxa de fechamento",v:32,meta:35,f:"pct"}]},
  {name:"Financeiro",score:94,kpis:[
    {k:"Faturamento geral",v:1574000,meta:1500000,f:"money"},{k:"Recebido",v:958000,meta:1020000,f:"money"},
    {k:"Inadimplência",v:4.1,meta:5.0,f:"pct",inv:true},{k:"Margem",v:38,meta:36,f:"pct"}]},
  {name:"Consultoria",score:91,kpis:[
    {k:"Projetos ativos",v:34,meta:32,f:"int"},{k:"NPS",v:72,meta:70,f:"int"},
    {k:"Horas entregues",v:1180,meta:1250,f:"int"},{k:"Receita recorrente",v:214000,meta:200000,f:"money"}]},
  {name:"Eventos",score:103,kpis:[
    {k:"Inscritos",v:1240,meta:1100,f:"int"},{k:"Comparecimento",v:78,meta:75,f:"pct"},
    {k:"Receita de eventos",v:286000,meta:260000,f:"money"},{k:"Custo por inscrito",v:21,meta:25,f:"money",inv:true}]},
  {name:"Pedagógico",score:85,kpis:[
    {k:"Conclusão de turmas",v:84,meta:90,f:"pct"},{k:"Satisfação (NPS)",v:68,meta:72,f:"int"},
    {k:"Evasão",v:9,meta:8,f:"pct",inv:true},{k:"Turmas ativas",v:18,meta:18,f:"int"}]},
];
const FAT=[{m:"Jan",real:1180000,meta:1200000},{m:"Fev",real:1240000,meta:1250000},{m:"Mar",real:1390000,meta:1300000},
  {m:"Abr",real:1310000,meta:1350000},{m:"Mai",real:1455000,meta:1400000},{m:"Jun",real:1574000,meta:1500000}];
const FUNNEL=[{k:"Leads",v:3450},{k:"Contatos",v:3012},{k:"Reuniões agendadas",v:631},{k:"Comparecimentos",v:332},{k:"Vendas",v:118}];

/* ===== helpers ===== */
const fmtInt=v=>Math.round(v).toLocaleString("pt-BR");
const fmtMoney=v=>"R$ "+Math.round(v).toLocaleString("pt-BR");
const fmtK=v=>v>=1e6?"R$ "+(v/1e6).toFixed(2).replace(".",",")+"M":v>=1000?"R$ "+Math.round(v/1000)+"k":fmtMoney(v);
function fmtVal(k){ if(k.f==="money")return fmtMoney(k.v); if(k.f==="pct")return k.v.toLocaleString("pt-BR")+"%"; if(k.f==="x")return k.v.toLocaleString("pt-BR")+"x"; return fmtInt(k.v); }
function metaTxt(k){ if(k.f==="money")return fmtK(k.meta); if(k.f==="pct")return k.meta+"%"; if(k.f==="x")return k.meta+"x"; return fmtInt(k.meta); }
const ratio=k=>k.inv?(k.v>0?k.meta/k.v:0):(k.meta>0?k.v/k.meta:null);
const tone=r=>r==null?"gray":r>=1?"green":r>=0.8?"orange":"red";
const COL={green:"#16A34A",orange:"#F97316",red:"#EF4444",gray:"#94A3B8"};
const scoreTone=s=>s>=100?"green":s>=80?"orange":"red";
function deltaInfo(k){ if(k.noStatus)return null; const r=ratio(k), t=tone(r);
  const fav=k.inv?(k.meta-k.v)/k.meta:(k.v-k.meta)/k.meta; const p=Math.abs(fav*100);
  return {t, txt:(fav>=0?"+":"−")+(p>=10?Math.round(p):p.toFixed(1).replace(".",","))+"%"}; }
function setRing(el,pct,innerBg){ const t=scoreTone(pct), col=COL[t], fill=Math.min(pct,100);
  el.style.background=`conic-gradient(${col} ${fill}%,var(--ring-track) 0)`; el.style.boxShadow=`0 0 18px ${col}40`;
  const i=el.querySelector(".in"); i.textContent=pct+"%"; if(!innerBg) i.style.color=col; }

/* ===== render ===== */
document.getElementById("comp").textContent=COMP+" · consolidado · 6 áreas";
setRing(document.getElementById("bigring"),CONSOL,true);
document.getElementById("bigpct").textContent=CONSOL+"%";

const BADGE={green:"✔ no ritmo",orange:"▲ quase",red:"▼ atenção",gray:"—"};
const areasEl=document.getElementById("areas");
AREAS.forEach(a=>{
  const t=scoreTone(a.score);
  const card=document.createElement("div"); card.className="card"; card.style.setProperty("--c",COL[t]);
  const kpiHTML=a.kpis.map(k=>{
    const d=deltaInfo(k); const tt=k.noStatus?"gray":d.t;
    return `<div class="kpi"><span class="k">${k.k}</span>
      <span class="v" style="color:${k.noStatus?'var(--text)':COL[tt]}">${fmtVal(k)}<small>/ ${metaTxt(k)}</small></span>
      <span class="d d-${tt}">${d?d.txt:"—"}</span></div>`;
  }).join("");
  card.innerHTML=`<div class="card-h"><div class="ring"><div class="in"></div></div>
      <div class="nm"><div class="area">${a.name}</div><span class="badge badge-${t}">${BADGE[t]}</span></div></div>
    <div class="kpis">${kpiHTML}</div>`;
  areasEl.appendChild(card);
  setRing(card.querySelector(".ring"),a.score);
});

/* faturamento */
const maxFat=Math.max(...FAT.map(d=>Math.max(d.real,d.meta)))*1.1;
const chartEl=document.getElementById("chart");
FAT.forEach(d=>{
  const hReal=d.real/maxFat*100, hMeta=d.meta/maxFat*100, t=d.real>=d.meta?"green":"orange";
  const grad=t==="green"?"linear-gradient(180deg,#22C55E,#15803D)":"linear-gradient(180deg,#FB923C,#EA580C)";
  const col=document.createElement("div"); col.className="col";
  col.innerHTML=`<div class="vv" style="color:${COL[t]}">${fmtK(d.real)}</div>
    <div class="bars"><div class="barr" style="height:${hReal}%;background:${grad}">
      <div class="metaline" style="bottom:${hMeta/hReal*100}%"></div></div></div><div class="ml">${d.m}</div>`;
  chartEl.appendChild(col);
});

/* funil */
const maxF=FUNNEL[0].v, funnelEl=document.getElementById("funnel");
FUNNEL.forEach((d,i)=>{
  const w=42+(d.v/maxF)*58, conv=i>0?`${Math.round(d.v/FUNNEL[i-1].v*100)}%`:"";
  const fb=document.createElement("div"); fb.className="fb"; fb.style.width=w+"%";
  fb.innerHTML=`<span class="fl">${d.k}</span><span class="fv">${fmtInt(d.v)}</span>${conv?`<span class="conv">↓ ${conv}</span>`:""}`;
  funnelEl.appendChild(fb);
});
</script>
</body>
</html>
