<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACME • Painel Executivo — Demo</title>
<meta name="description" content="Painel executivo de BI — demo com dados 100% fictícios. Jean Felipe Carneiro.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B3A6B; --navy2:#15315A; --navy-lt:#3D6FBF;
    --bg:#EAEFF6; --bg2:#F4F7FB; --surface:#FFFFFF;
    --line:#E2E8F0; --text:#1E293B; --muted:#64748B; --dim:#94A3B8;
    --green:#16A34A; --orange:#F97316; --red:#EF4444; --gray:#94A3B8;
    --track:#EAEFF6; --ring-track:#E5EAF2;
    --gold:#E0A100; --silver:#9AA7BC; --bronze:#C2772F;
    --shadow:0 1px 3px rgba(20,40,80,.06),0 8px 26px rgba(20,40,80,.07);
    --radius:18px; --mono:'IBM Plex Mono',monospace;
    --bg-green:#DCFCE7; --bg-orange:#FEF3C7; --bg-red:#FEE2E2; --bg-gray:#F1F5F9;
    --tx-green:#15803D; --tx-orange:#B45309; --tx-red:#DC2626; --tx-gray:#64748B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(120vw 80vh at 50% -20vh,rgba(61,111,191,.10),transparent 60%),linear-gradient(180deg,var(--bg2),var(--bg) 70%);
    color:var(--text);font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px 56px}
  /* header */
  header{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
    background:linear-gradient(100deg,var(--navy),var(--navy2));color:#fff;border-radius:0 0 22px 22px;
    padding:22px 28px;box-shadow:0 10px 30px rgba(20,40,80,.18);margin-bottom:26px}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand b{font-size:26px;font-weight:800;letter-spacing:.02em}
  .brand span{font-size:14px;color:#AAC2E8}
  .htitle{display:flex;flex-direction:column;gap:3px}
  .htitle h1{font-size:19px;font-weight:700;letter-spacing:.01em}
  .htitle .sub{font-family:var(--mono);font-size:12px;color:#AAC2E8;letter-spacing:.08em;text-transform:uppercase}
  .hscore{display:flex;align-items:center;gap:14px}
  .hscore .lbl{text-align:right;font-size:12px;color:#AAC2E8;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;line-height:1.5}
  .hscore .lbl b{display:block;color:#fff;font-family:'Hanken Grotesk';font-size:13px;letter-spacing:0;text-transform:none}
  .bigring{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;flex:none}
  .bigring .in{width:68px;height:68px;border-radius:50%;background:var(--navy);display:grid;place-items:center;
    font-size:24px;font-weight:800;color:#fff}
  .live{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:#84F0AE}
  .live i{width:8px;height:8px;border-radius:50%;background:#2FD673;box-shadow:0 0 0 0 rgba(47,214,115,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,214,115,.5)}70%{box-shadow:0 0 0 9px rgba(47,214,115,0)}100%{box-shadow:0 0 0 0 rgba(47,214,115,0)}}
  /* area grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:20px 20px 18px;display:flex;flex-direction:column;gap:14px;transition:transform .2s,box-shadow .2s}
  .card:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(20,40,80,.10),0 18px 40px rgba(20,40,80,.10)}
  .card-h{display:flex;align-items:center;gap:13px}
  .ring{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;flex:none}
  .ring .in{width:42px;height:42px;border-radius:50%;background:var(--surface);display:grid;place-items:center;
    font-size:14px;font-weight:800}
  .card-h .nm{flex:1;min-width:0}
  .card-h .nm .area{font-size:17px;font-weight:700;letter-spacing:.01em}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;margin-top:3px}
  .badge-green{background:var(--bg-green);color:var(--tx-green)}.badge-orange{background:var(--bg-orange);color:var(--tx-orange)}
  .badge-red{background:var(--bg-red);color:var(--tx-red)}.badge-gray{background:var(--bg-gray);color:var(--tx-gray)}
  .kpis{display:flex;flex-direction:column;gap:11px;border-top:1px solid var(--line);padding-top:13px}
  .kpi .row1{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .kpi .k{font-size:13px;color:var(--muted);font-weight:500}
  .kpi .v{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
  .kpi .v small{font-size:12px;font-weight:600;color:var(--dim);margin-left:3px}
  .kpi .bar{height:6px;border-radius:99px;background:var(--track);margin-top:5px;overflow:hidden}
  .kpi .bar>i{display:block;height:100%;border-radius:99px}
  /* bottom row */
  .bottom{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-top:18px}
  @media(max-width:880px){.bottom{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px}
  .panel h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:9px}
  .panel h3::before{content:"";width:4px;height:16px;border-radius:99px;background:var(--navy-lt)}
  /* faturamento chart */
  .chart{display:flex;align-items:flex-end;gap:14px;height:200px;padding-top:8px}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
  .bars{position:relative;width:100%;max-width:46px;height:100%;display:flex;align-items:flex-end;justify-content:center}
  .barr{width:100%;border-radius:7px 7px 0 0;background:linear-gradient(180deg,var(--navy-lt),var(--navy));position:relative}
  .metaline{position:absolute;left:-3px;right:-3px;height:2px;background:var(--orange);border-radius:2px}
  .metaline::after{content:"meta";position:absolute;right:0;top:-15px;font-size:9px;color:var(--orange);font-family:var(--mono)}
  .col .ml{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .col .vv{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  /* funnel */
  .funnel{display:flex;flex-direction:column;gap:9px}
  .fb{position:relative;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;background:linear-gradient(90deg,rgba(61,111,191,.16),rgba(61,111,191,.05));border:1px solid rgba(61,111,191,.2);color:var(--text)}
  .fb .fl{font-size:13px;font-weight:600;color:var(--navy)}
  .fb .fv{font-family:'Hanken Grotesk';font-size:17px;font-weight:800;font-variant-numeric:tabular-nums}
  .fb .conv{position:absolute;right:14px;top:-9px;font-size:10px;font-family:var(--mono);color:var(--dim)}
  footer{margin-top:30px;text-align:center;color:var(--dim);font-size:12px;font-family:var(--mono);letter-spacing:.04em}
  footer b{color:var(--bronze)}
  footer a{color:var(--navy-lt);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><b>ACME</b><span>Escola de Negócios</span></div>
    <div class="htitle">
      <h1>Painel Executivo</h1>
      <span class="sub" id="comp">— consolidado · 6 áreas</span>
    </div>
    <div class="hscore">
      <div class="lbl">Score consolidado<b id="live">▲ no ritmo</b><span class="live"><i></i>AO VIVO</span></div>
      <div class="bigring" id="bigring"><div class="in" id="bigpct">—</div></div>
    </div>
  </header>

  <div class="grid" id="areas"></div>

  <div class="bottom">
    <div class="panel">
      <h3>Faturamento × meta — últimos 6 meses</h3>
      <div class="chart" id="chart"></div>
    </div>
    <div class="panel">
      <h3>Funil comercial do mês</h3>
      <div class="funnel" id="funnel"></div>
    </div>
  </div>

  <footer>
    demo · dados 100% fictícios · <b>Jean Felipe Carneiro</b> — <a href="https://jeanfelipecr-ds.github.io" target="_blank" rel="noopener">jeanfelipecr-ds.github.io</a>
  </footer>
</div>

<script>
/* ===== DADOS 100% FICTÍCIOS (demo de portfólio) ===== */
const COMP = "Junho / 2026";
const CONSOL = 92;
const AREAS = [
  { name:"Marketing", score:96, kpis:[
    {k:"Leads no mês", v:1420, meta:1400, f:"int"},
    {k:"CPL", v:28, meta:30, f:"money", inv:true},
    {k:"ROAS", v:8.4, meta:8.0, f:"x"},
    {k:"Investimento", v:42000, meta:45000, f:"money", noStatus:true},
  ]},
  { name:"Comercial", score:88, kpis:[
    {k:"Vendas", v:108, meta:123, f:"int"},
    {k:"Faturamento", v:1520000, meta:1500000, f:"money"},
    {k:"Ticket médio", v:9200, meta:9000, f:"money"},
    {k:"Taxa de fechamento", v:32, meta:35, f:"pct"},
  ]},
  { name:"Financeiro", score:94, kpis:[
    {k:"Faturamento geral", v:1574000, meta:1500000, f:"money"},
    {k:"Recebido", v:958000, meta:1020000, f:"money"},
    {k:"Inadimplência", v:4.1, meta:5.0, f:"pct", inv:true},
    {k:"Margem", v:38, meta:36, f:"pct"},
  ]},
  { name:"Consultoria", score:91, kpis:[
    {k:"Projetos ativos", v:34, meta:32, f:"int"},
    {k:"NPS", v:72, meta:70, f:"int"},
    {k:"Horas entregues", v:1180, meta:1250, f:"int"},
    {k:"Receita recorrente", v:214000, meta:200000, f:"money"},
  ]},
  { name:"Eventos", score:103, kpis:[
    {k:"Inscritos", v:1240, meta:1100, f:"int"},
    {k:"Comparecimento", v:78, meta:75, f:"pct"},
    {k:"Receita de eventos", v:286000, meta:260000, f:"money"},
    {k:"Custo por inscrito", v:21, meta:25, f:"money", inv:true},
  ]},
  { name:"Pedagógico", score:85, kpis:[
    {k:"Conclusão de turmas", v:84, meta:90, f:"pct"},
    {k:"Satisfação (NPS)", v:68, meta:72, f:"int"},
    {k:"Evasão", v:9, meta:8, f:"pct", inv:true},
    {k:"Turmas ativas", v:18, meta:18, f:"int"},
  ]},
];
const FAT = [
  {m:"Jan", real:1180000, meta:1200000},{m:"Fev", real:1240000, meta:1250000},
  {m:"Mar", real:1390000, meta:1300000},{m:"Abr", real:1310000, meta:1350000},
  {m:"Mai", real:1455000, meta:1400000},{m:"Jun", real:1574000, meta:1500000},
];
const FUNNEL = [
  {k:"Leads", v:3450},{k:"Contatos", v:3012},{k:"Reuniões agendadas", v:631},
  {k:"Comparecimentos", v:332},{k:"Vendas", v:118},
];

/* ===== helpers ===== */
const fmtInt = v => Math.round(v).toLocaleString("pt-BR");
const fmtMoney = v => "R$ " + Math.round(v).toLocaleString("pt-BR");
const fmtK = v => v>=1000 ? "R$ "+(v/1e6>=1 ? (v/1e6).toFixed(2).replace(".",",")+"M" : Math.round(v/1000)+"k") : fmtMoney(v);
function fmtVal(k){
  if(k.f==="money") return fmtMoney(k.v);
  if(k.f==="pct") return k.v.toLocaleString("pt-BR")+"%";
  if(k.f==="x") return k.v.toLocaleString("pt-BR")+"x";
  return fmtInt(k.v);
}
function ratio(k){ return k.inv ? (k.v>0 ? k.meta/k.v : 0) : (k.meta>0 ? k.v/k.meta : null); }
function tone(r){ if(r==null) return "gray"; return r>=1 ? "green" : r>=0.8 ? "orange" : "red"; }
const COL = {green:"#16A34A",orange:"#F97316",red:"#EF4444",gray:"#94A3B8"};
function scoreTone(s){ return s>=100?"green":s>=80?"orange":"red"; }

function ringHTML(el, pct, big){
  const t = scoreTone(pct), col = COL[t];
  const fill = Math.min(pct,100);
  el.style.background = `conic-gradient(${col} ${fill}%, var(--ring-track) 0)`;
  el.style.boxShadow = `0 0 16px ${col}33`;
  const inner = el.querySelector(".in");
  inner.textContent = pct+"%";
  inner.style.color = col;
}

/* ===== render ===== */
document.getElementById("comp").textContent = COMP + " · consolidado · 6 áreas";
ringHTML(document.getElementById("bigring"), CONSOL, true);
document.getElementById("bigpct").style.color = "#fff";
document.getElementById("bigpct").textContent = CONSOL+"%";

const BADGE = {green:"✔ no ritmo", orange:"▲ quase", red:"▼ atenção", gray:"—"};
const areasEl = document.getElementById("areas");
AREAS.forEach(a=>{
  const t = scoreTone(a.score);
  const card = document.createElement("div"); card.className="card";
  const kpiHTML = a.kpis.map(k=>{
    const r = k.noStatus ? null : ratio(k);
    const tt = k.noStatus ? "gray" : tone(r);
    const fill = r==null ? 0 : Math.min(100, Math.round(r*100));
    const metaTxt = k.f==="money" ? fmtK(k.meta) : k.f==="pct" ? k.meta+"%" : k.f==="x" ? k.meta+"x" : fmtInt(k.meta);
    return `<div class="kpi">
      <div class="row1"><span class="k">${k.k}</span>
        <span class="v" style="color:${k.noStatus?'var(--text)':COL[tt]}">${fmtVal(k)}<small>/ ${metaTxt}</small></span></div>
      <div class="bar"><i style="width:${fill}%;background:${COL[tt]}"></i></div></div>`;
  }).join("");
  card.innerHTML = `
    <div class="card-h">
      <div class="ring" data-s="${a.score}"><div class="in"></div></div>
      <div class="nm"><div class="area">${a.name}</div>
        <span class="badge badge-${t}">${BADGE[t]}</span></div>
    </div>
    <div class="kpis">${kpiHTML}</div>`;
  areasEl.appendChild(card);
  ringHTML(card.querySelector(".ring"), a.score);
});

/* faturamento chart */
const maxFat = Math.max(...FAT.map(d=>Math.max(d.real,d.meta)))*1.08;
const chartEl = document.getElementById("chart");
FAT.forEach(d=>{
  const hReal = (d.real/maxFat*100), hMeta=(d.meta/maxFat*100);
  const t = d.real>=d.meta ? "green" : "orange";
  const col = document.createElement("div"); col.className="col";
  col.innerHTML = `
    <div class="vv" style="color:${COL[t]}">${fmtK(d.real)}</div>
    <div class="bars"><div class="barr" style="height:${hReal}%">
      <div class="metaline" style="bottom:${(hMeta/hReal*100)}%"></div></div></div>
    <div class="ml">${d.m}</div>`;
  chartEl.appendChild(col);
});

/* funil */
const maxF = FUNNEL[0].v;
const funnelEl = document.getElementById("funnel");
FUNNEL.forEach((d,i)=>{
  const w = 40 + (d.v/maxF)*60;
  const conv = i>0 ? `${Math.round(d.v/FUNNEL[i-1].v*100)}%` : "";
  const fb = document.createElement("div"); fb.className="fb"; fb.style.width=w+"%";
  fb.innerHTML = `<span class="fl">${d.k}</span><span class="fv">${fmtInt(d.v)}</span>${conv?`<span class="conv">${conv}</span>`:""}`;
  funnelEl.appendChild(fb);
});
</script>
</body>
</html>
